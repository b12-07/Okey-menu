<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Okey — Menü</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --krem:#f6f1e9;--krem2:#ede8df;--krem3:#e3ddd3;
  --yazi:#28231e;--yazi2:#56504a;--yazi3:#8a847e;
  --altin:#8b6914;--altin2:#b8901e;
  --ince:rgba(40,35,30,0.1);--ince2:rgba(40,35,30,0.06);
}
html{scroll-behavior:smooth;}
body{background:var(--krem);color:var(--yazi);font-family:'Montserrat',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(139,105,20,0.05) 0%,transparent 50%);}

.header{position:relative;z-index:10;text-align:center;padding:36px 24px 24px;border-bottom:1px solid var(--ince);background:var(--krem);}
.header-ust{font-size:.55rem;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--yazi3);margin-bottom:10px;}
.header-adi{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;font-style:italic;letter-spacing:4px;color:var(--yazi);line-height:1;}
.header-alt{font-size:.55rem;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--yazi3);margin-top:8px;}
.header-cizgi{display:flex;align-items:center;gap:12px;margin-top:16px;}
.hc-line{flex:1;height:1px;background:var(--ince);}
.hc-orta{font-size:.55rem;letter-spacing:4px;text-transform:uppercase;color:var(--yazi3);font-weight:500;}

.sekme-kap{position:sticky;top:0;z-index:100;background:var(--krem);border-bottom:1px solid var(--ince);}
.sekmeler{display:flex;overflow-x:auto;scrollbar-width:none;}
.sekmeler::-webkit-scrollbar{display:none;}
.sekme{flex:1;min-width:72px;padding:14px 8px 12px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--yazi3);font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s ease;}
.sekme-ikon{font-size:1.1rem;display:block;margin-bottom:3px;opacity:.6;}
.sekme.aktif{color:var(--yazi);border-bottom-color:var(--altin);}
.sekme.aktif .sekme-ikon{opacity:1;}

.panel{display:none;position:relative;z-index:1;}
.panel.aktif{display:block;animation:panelIn .3s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.kat-baslik{padding:20px 20px 14px;border-bottom:1px solid var(--ince2);display:flex;align-items:baseline;justify-content:space-between;}
.kat-baslik-adi{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;font-style:italic;letter-spacing:2px;color:var(--yazi);}
.kat-baslik-sayi{font-size:.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--yazi3);}

.urun-list{padding:4px 20px 24px;}
.urun-satir{display:flex;align-items:baseline;gap:0;padding:13px 0;border-bottom:1px solid var(--ince2);}
.urun-satir:last-child{border-bottom:none;}
.u-no{font-size:.58rem;font-weight:500;letter-spacing:1px;color:var(--yazi3);width:24px;flex-shrink:0;}
.u-icerik{flex:1;min-width:0;}
.u-adi{font-family:'Cormorant Garamond',serif;font-size:1.12rem;font-weight:400;color:var(--yazi);line-height:1.3;}
.u-aciklama{font-size:.6rem;font-weight:400;font-style:italic;color:var(--yazi3);margin-top:2px;}
.dot-line{flex:1;min-width:20px;border-bottom:1px dotted var(--ince);margin:0 10px;margin-bottom:4px;}
.u-fiyat{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500;color:var(--altin);white-space:nowrap;flex-shrink:0;}

.masa-wrap{padding:0 20px 28px;}
.masa-baslik{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;font-style:italic;letter-spacing:2px;color:var(--yazi);padding:20px 0 14px;border-bottom:1px solid var(--ince2);margin-bottom:16px;}
.masa-satir{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--ince2);}
.masa-satir:last-child{border-bottom:none;}
.masa-satir-adi{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--yazi);flex:1;}
.masa-satir-sure{font-size:.62rem;font-style:italic;color:var(--yazi3);margin-right:16px;}
.masa-satir-fiyat{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:var(--altin);white-space:nowrap;}

.footer{text-align:center;padding:20px 20px 28px;border-top:1px solid var(--ince2);margin-top:8px;}
.footer-cizgi{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.fc-line{flex:1;height:1px;background:var(--ince);}
.fc-orta{font-size:.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--yazi3);}
.footer-text{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--yazi3);}
</style>
</head>
<body>

<header class="header">
  <div class="header-ust">Menü</div>
  <div class="header-adi">Okey</div>
  <div class="header-alt">2026</div>
  <div class="header-cizgi">
    <div class="hc-line"></div>
    <div class="hc-orta">✦</div>
    <div class="hc-line"></div>
  </div>
</header>

<div class="sekme-kap">
  <div class="sekmeler">
    <button class="sekme" onclick="ac('sicak')" id="s-sicak"><span class="sekme-ikon">☕</span>Sıcak</button>
    <button class="sekme" onclick="ac('kahve')" id="s-kahve"><span class="sekme-ikon">☕</span>Kahve</button>
    <button class="sekme" onclick="ac('soguk')" id="s-soguk"><span class="sekme-ikon">🧊</span>Soğuk</button>
    <button class="sekme" onclick="ac('yiyecek')" id="s-yiyecek"><span class="sekme-ikon">🍽️</span>Yiyecek</button>
    <button class="sekme" onclick="ac('masa')" id="s-masa"><span class="sekme-ikon">🎴</span>Masa</button>
  </div>
</div>

<!-- SICAK İÇECEKLER -->
<div class="panel" id="p-sicak">
  <div class="kat-baslik">
    <div class="kat-baslik-adi">☕ Sıcak İçecekler</div>
    <div class="kat-baslik-sayi">20 çeşit</div>
  </div>
  <div class="urun-list" id="list-sicak"></div>
</div>

<!-- KAHVE -->
<div class="panel" id="p-kahve">

</div>

<!-- SOĞUK İÇECEKLER -->
<div class="panel" id="p-soguk">
  <div class="kat-baslik">
    <div class="kat-baslik-adi">🧊 Soğuk İçecekler</div>
    <div class="kat-baslik-sayi">20 çeşit</div>
  </div>
  <div class="urun-list" id="list-soguk"></div>

<!-- YİYECEKLER -->
<div class="panel" id="p-yiyecek">
  <div class="kat-baslik">
    <div class="kat-baslik-adi">🍽️ Yiyecekler</div>
    <div class="kat-baslik-sayi">20 çeşit</div>
  </div>
  <div class="urun-list" id="list-yiyecek"></div>
</div>

<!-- MASA FİYATLARI -->
<div class="panel" id="p-masa">
  <div class="masa-wrap">
    <div class="masa-baslik">Masa Fiyatları</div>
    <div id="list-masa"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-cizgi"><div class="fc-line"></div><div class="fc-orta">✦</div><div class="fc-line"></div></div>
  <div class="footer-text">Okey</div>
</div>

const masalar = [
  {ad:"Standart Masa", fiyat:"50,00", sure:"Saat Başı / Kişi"},
  {ad:"VIP Masa", fiyat:"80,00", sure:"Saat Başı / Kişi"},
  {ad:"Büyük Salon Masası", fiyat:"40,00", sure:"Saat Başı / Kişi"},
  {ad:"Turnuva Masası", fiyat:"60,00", sure:"Saat Başı / Kişi"},
  {ad:"Öğrenci Masası", fiyat:"35,00", sure:"Saat Başı / Kişi"},
];

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderUrunler(){
  ['sicak','kahve','soguk','yiyecek'].forEach(kat=>{
    const el=document.getElementById('list-'+kat);
    if(!el)return;
    el.innerHTML=menu[kat].map((u,i)=>`
      <div class="urun-satir">
        <span class="u-no">${String(i+1).padStart(2,'0')}</span>
        <div class="u-icerik">
          <div class="u-adi">${u.ad}</div>
          ${u.aciklama?`<div class="u-aciklama">${u.aciklama}</div>`:''}
        </div>
        <span class="dot-line"></span>
        <span class="u-fiyat">₺${u.fiyat}</span>
      </div>`).join('');
    // Çeşit sayısını güncelle
    const baslik=document.querySelector(`#p-${kat} .kat-baslik-sayi`);
    if(baslik)baslik.textContent=menu[kat].length+' çeşit';
  });

  // Masalar
  const masaEl=document.getElementById('list-masa');
  if(masaEl){
    masaEl.innerHTML=masalar.map(m=>`
      <div class="masa-satir">
        <span class="masa-satir-adi">${m.ad}</span>
        ${m.sure?`<span class="masa-satir-sure">${m.sure}</span>`:''}
        <span class="masa-satir-fiyat">₺${m.fiyat}</span>
      </div>`).join('');
  }
}

function ac(slug){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('aktif'));
  document.querySelectorAll('.sekme').forEach(s=>s.classList.remove('aktif'));
  const p=document.getElementById('p-'+slug),s=document.getElementById('s-'+slug);
  if(p)p.classList.add('aktif');
  if(s)s.classList.add('aktif');
  window.scrollTo({top:0,behavior:'smooth'});
}

renderUrunler();
ac('sicak');
</script>
