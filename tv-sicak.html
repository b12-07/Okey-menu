<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sıcak İçecekler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --krem:#f6f1e9;--krem2:#ede8df;--yazi:#28231e;
  --yazi2:#56504a;--yazi3:#8a847e;
  --altin:#8b6914;--altin2:#b8901e;
  --ince:rgba(40,35,30,0.1);--ince2:rgba(40,35,30,0.06);
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--krem);font-family:'Montserrat',sans-serif;color:var(--yazi);}

.sayfa{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.header{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:2vh 3vw 1.5vh;
  border-bottom:1px solid var(--ince);
}
.salon-adi{font-size:1.4vw;font-weight:700;letter-spacing:.4vw;text-transform:uppercase;color:var(--yazi2);}
.kat-wrap{text-align:center;}
.kat-adi{
  font-family:'Cormorant Garamond',serif;
  font-size:6.5vh;font-weight:300;letter-spacing:.5vw;
  text-transform:uppercase;font-style:italic;color:var(--yazi);
}
.sag-panel{display:flex;flex-direction:column;align-items:flex-end;gap:.3vh;}
.saat{font-family:'Cormorant Garamond',serif;font-size:5.5vh;font-weight:400;color:var(--yazi);letter-spacing:.3vw;line-height:1;}
.saat-nokta{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.tarih{font-size:1.3vh;font-weight:600;letter-spacing:.2vw;text-transform:uppercase;color:var(--yazi3);}
.gun{color:var(--altin);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:1vw;padding:.6vh 3vw;}
.div-line{flex:1;height:1px;background:var(--ince);}
.div-center{font-size:1.1vh;letter-spacing:.3vw;text-transform:uppercase;color:var(--yazi3);}

/* ÜRÜNLER */
.urunler-wrap{flex:1;min-height:0;padding:.5vh 3vw 0;overflow:hidden;}
.urunler-kolonlar{display:grid;grid-template-columns:1fr 1fr;gap:0 4vw;height:100%;align-content:start;}
.urun-satir{
  display:flex;align-items:baseline;
  padding:1.1vh 0;border-bottom:1px solid var(--ince2);
  opacity:0;transform:translateY(6px);
  transition:opacity .4s,transform .4s,background .3s;
}
.urun-satir.gorunsun{opacity:1;transform:translateY(0);}
.urun-satir.spot{background:rgba(139,105,20,0.05);margin:0 -.5vw;padding-left:.5vw;padding-right:.5vw;border-radius:4px;border-bottom-color:transparent;}
.urun-no{font-size:1.3vh;font-weight:600;color:var(--yazi3);width:2.5vw;flex-shrink:0;}
.urun-adi{
  font-family:'Cormorant Garamond',serif;
  font-size:3.2vh;font-weight:400;color:var(--yazi);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.urun-aciklama{font-size:1.3vh;color:var(--yazi3);margin-left:.5vw;flex-shrink:0;font-style:italic;}
.dot-line{flex:1;min-width:.5vw;max-width:4vw;border-bottom:1px dotted var(--ince);margin:0 .6vw;margin-bottom:.4vh;}
.fiyat{font-family:'Cormorant Garamond',serif;font-size:3vh;font-weight:600;color:var(--altin);white-space:nowrap;flex-shrink:0;}
.urun-satir.spot .fiyat{color:var(--altin2);}

/* MASA TICKER */
.masa-banner{
  border-top:1px solid var(--ince);padding:1.2vh 3vw;
  display:flex;align-items:center;gap:2vw;background:var(--krem2);
}
.masa-etiket{font-size:1.2vh;font-weight:700;letter-spacing:.25vw;text-transform:uppercase;color:var(--yazi2);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:.8vw;}
.masa-etiket::after{content:'';width:1px;height:1.5vh;background:var(--ince);}
.masa-ticker-wrap{overflow:hidden;flex:1;}
.masa-ticker{display:flex;gap:4vw;white-space:nowrap;animation:scroll 40s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.masa-item{display:flex;align-items:center;gap:.6vw;}
.masa-item-adi{font-family:'Cormorant Garamond',serif;font-size:2vh;font-weight:500;color:var(--yazi2);}
.masa-item-fiyat{font-size:1.8vh;color:var(--altin);font-weight:700;}
.masa-item-sure{font-size:1.3vh;color:var(--yazi3);font-style:italic;}
.masa-sep{color:var(--ince);margin:0 .3vw;}

.fs-btn{position:fixed;bottom:1.5vh;right:1.5vw;z-index:999;background:rgba(40,35,30,0.07);border:1px solid var(--ince);color:var(--yazi3);font-size:1vh;font-family:'Montserrat',sans-serif;letter-spacing:2px;text-transform:uppercase;padding:.5vh .8vw;border-radius:4px;cursor:pointer;opacity:.25;transition:opacity .3s;}
.fs-btn:hover{opacity:1;}
</style>
</head>
<body>
<button class="fs-btn" onclick="tamEkran()">⛶ Tam Ekran</button>
<div class="sayfa">
  <header class="header">
    <div class="salon-adi" id="h-salon"></div>
    <div class="kat-wrap">
      <div class="kat-adi">☕ Sıcak İçecekler</div>
    </div>
    <div class="sag-panel">
      <div class="saat"><span id="ss">--</span><span class="saat-nokta">:</span><span id="sd">--</span></div>
      <div class="tarih"><span class="gun" id="gun"></span> · <span id="tarih"></span></div>
    </div>
  </header>
  <div class="divider">
    <div class="div-line"></div>
    <div class="div-center">Sıcak İçecekler</div>
    <div class="div-line"></div>
  </div>
  <div class="urunler-wrap">
    <div class="urunler-kolonlar">
      <div id="kolon-sol"></div>
      <div id="kolon-sag"></div>
    </div>
  </div>
  <div class="masa-banner">
    <div class="masa-etiket">Masa Fiyatları</div>
    <div class="masa-ticker-wrap"><div class="masa-ticker" id="ticker"></div></div>
  </div>
</div>
<script src="data.js"></script>
<script>
const KAT='sicak';
document.getElementById('h-salon').textContent=SALON_ADI;
const G=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const nd=new Date();
document.getElementById('gun').textContent=G[nd.getDay()];
document.getElementById('tarih').textContent=String(nd.getDate()).padStart(2,'0')+'.'+String(nd.getMonth()+1).padStart(2,'0')+'.'+nd.getFullYear();
(function t(){const n=new Date();document.getElementById('ss').textContent=String(n.getHours()).padStart(2,'0');document.getElementById('sd').textContent=String(n.getMinutes()).padStart(2,'0');setTimeout(t,1000);})();
const ur=MENU[KAT]||[];const y=Math.ceil(ur.length/2);
function sHTML(u,n){return`<div class="urun-satir"><span class="urun-no">${String(n).padStart(2,'0')}</span><span class="urun-adi">${u.ad}</span>${u.aciklama?`<span class="urun-aciklama">${u.aciklama}</span>`:''}<span class="dot-line"></span><span class="fiyat">₺${u.fiyat}</span></div>`;}
document.getElementById('kolon-sol').innerHTML=ur.slice(0,y).map((u,i)=>sHTML(u,i+1)).join('');
document.getElementById('kolon-sag').innerHTML=ur.slice(y).map((u,i)=>sHTML(u,y+i+1)).join('');
const tk=document.getElementById('ticker');
if(tk)tk.innerHTML=[...MASALAR,...MASALAR].map(m=>`<div class="masa-item"><span class="masa-item-adi">${m.ad}</span><span class="masa-item-fiyat">₺${m.fiyat}</span>${m.sure?`<span class="masa-item-sure">/ ${m.sure}</span>`:''}</div><span class="masa-sep">—</span>`).join('');
const ss=document.querySelectorAll('.urun-satir');
ss.forEach((s,i)=>setTimeout(()=>s.classList.add('gorunsun'),i*55+200));
let si=0;function spot(){ss.forEach(s=>s.classList.remove('spot'));if(ss.length)ss[si%ss.length].classList.add('spot');si++;}
setTimeout(()=>{spot();setInterval(spot,3500);},2000);
function tamEkran(){const e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();}
window.addEventListener('load',()=>setTimeout(tamEkran,500));
document.addEventListener('click',tamEkran,{once:true});
(async()=>{try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}} )();
setTimeout(()=>location.reload(),300000);
</script>
</body>
</html>
